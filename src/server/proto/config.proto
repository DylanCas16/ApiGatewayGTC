syntax = "proto3";
package gateway;

import "adapter.proto";


// Auxiliar
message Property {
    string name = 1;
    AnyValue value = 2;
}

// Unary ConfigManager functions
message GetPropRequest {
    string property_name = 1;
}

message PropertyValue {
    Property property = 1;
}

message SetPropRequest {
    Property property = 1;
}

message SetPropResponse {
    bool done = 1;
}

// Stream ConfigManager functions
message ConfigReq {
    string property_name = 1;
}

message ConfigEvent {
    string config_name = 1;
    string class_name = 2;
    string component_name = 3;
    int64 time_stamp = 4;
}
