syntax = "proto3";
package gateway;

import "adapter.proto";


// Auxiliar
enum Mode {
    UNSPECIFIED = 0;
    IN = 1;
    OUT = 2;
    INOUT = 3;
}

message Param {
    string name = 1;
    TypeKind typeCode = 2;
    Mode mode = 3;
}

message Method {
    string name = 1;
    TypeKind resultTypeCode = 2;
    repeated Param params = 3;
}

message NamingEntry {
    string name = 1;
    string ior = 2;
}

// Unary NS, IFR, DII functions
message InvokeRequest {
    string component_name = 1;
    string method_name = 2;
    repeated string args = 3;
}

message InvokeResponse {
    string return_value = 1;
    repeated string out_args = 2;
}

message ResolveRequest {
    string component_name = 1;
}

message ComponentInfo {
    string component_name = 1;
    repeated Method methods = 2;
}

message NamingRequest {}

message NamingResponse {
    repeated NamingEntry entries = 1;
}
