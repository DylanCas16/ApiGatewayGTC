syntax = "proto3";
package gateway;

// Auxiliar enums
enum TypeKind {
    TYPE_UNKNOWN   = 0;
    TYPE_FLOAT     = 1;
    TYPE_DOUBLE    = 2;
    TYPE_SHORT     = 3;
    TYPE_LONG      = 4;
    TYPE_BOOLEAN   = 5;
    TYPE_OCTET     = 6;
    TYPE_STRING    = 7;
    TYPE_TIMEVALUE = 8;
}

enum MonitorType {
    Unknown          = 0;
    DataBlocks       = 1;
    StateChanges     = 2;
    MagnitudeChanges = 3;
}

enum AlarmState { 
    STATE_DOESNT_CARE = 0;
    ACTIVE_NACKED     = 1;
    ACTIVE_ACKED      = 2;
    INACTIVE_NACKED   = 3;
    INACTIVE_ACKED    = 4;
    SOLVED            = 5;
    ACK               = 6;
}

enum AlarmSeverity {
    SEVERITY_DOESNT_CARE = 0;
    LEVEL1               = 1;
    LEVEL2               = 2;
    LEVEL3               = 3;
    LEVEL4               = 4;
    LEVEL5               = 5;
}

enum MessageType {
    LOG_DOESNT_CARE = 0;
    DEBUG           = 1;
    INFO            = 2;
    ERROR_TYPE      = 3;
}

// Auxiliar messages
message Method {
    string name = 1;
    TypeKind resultTypeCode = 2;
}

message Param {
    string name = 1;
    TypeKind typeCode = 2;
}

message NamingEntry {
    string name = 1;
    string ior = 2;
}

message Property {
    string component_name = 1;
    TypeKind value = 2;
}

message DataBlockEvent {
    string          component_name = 1;
    string          magnitude = 2;
    int64           time_stamp = 3;
    repeated Sample samples = 4;
}

message StateChangeEvent {
    string component_name = 1;
    int64  time_stamp = 2;
    string new_state = 3;
}

message MagnitudeChangeEvent {
    string component_name = 1;
    string magnitude = 2;
    int64  time_stamp = 3;
    int32  new_value = 4;
}

message TimeInterval {
    int64 begin = 1;
    int64 end = 2;
}

// Unary messages
message InvokeRequest {
    string component_name = 1;
    string method_name = 2;
    repeated string args = 3;
}

message InvokeResponse {
    string return_value = 1;
    repeated string out_args = 2;
}

message ResolveRequest {
    string component_name = 1;
}

message ComponentInfo {
    string component_name = 1;
    repeated Method methods = 2;
    repeated Param params = 3;
}

message NamingRequest {}

message NamingResponse {
    repeated NamingEntry entries = 1;
}

message GetPropRequest {
    string component_name = 1;
}

message PropertyValue {
    Property property = 1;
}

message SetPropRequest {
    Property property = 1;
}

message SetPropResponse {
    bool done = 1;
}

// Stream messages
message MonitorReq {
    string component_name = 1;
    string topic = 2;
    MonitorType type = 3;

}

message MonitorEvent {
    oneof event {
        DataBlockEvent data_block = 1;
        StateChangeEvent state_change = 2;
        MagnitudeChangeEvent magnitude_change = 3;
    }
}

message AlarmReq {
    string alarm_name = 1;
    string component_name = 2;
    AlarmState state = 3;
    AlarmSeverity severity = 4;
}

message AlarmEvent {
    string alarm_name = 1;
    string component_name = 2;
    AlarmState state = 3;
    AlarmSeverity severity = 4;
    string description = 5;
    int64 time_stamp = 6;
    int64 id = 7;
}

message LogReq {
    string component_name = 1;
    int64 host_ip_address = 2;
    MessageType type = 3;
    TimeInterval time_stamp_range = 4;
}

message LogEvent {
    string component_name = 1;
    int64 host_ip_address = 2;
    string source_code = 3;
    MessageType type = 4;
    int64 time_stamp = 5;
    string msg_data = 6;
}

message ConfigReq {
    string component_name = 1;
}

message ConfigEvent {
    string component_name = 1;
    string property_name = 2;
    int64 time_stamp = 3;
}

service GatewayServer {
    rpc Invoke(InvokeRequest) returns (InvokeResponse);
    rpc Resolve(ResolveRequest) returns (ComponentInfo);
    rpc ListNaming(NamingRequest) returns (NamingResponse);
    rpc GetProperty(GetPropRequest) returns (PropertyValue);
    rpc SetProperty(SetPropRequest) returns (SetPropResponse);

    rpc SubscribeMonitor(MonitorReq) returns (stream MonitorEvent);
    rpc SubscribeAlarms(AlarmReq) returns (stream AlarmEvent);
    rpc SubscribeLogs(LogReq) returns (stream LogEvent);
    rpc SubscribeConfig(ConfigReq) returns (stream ConfigEvent);
}
