syntax = "proto3";
package gateway;

import "core.proto";
import "config.proto";
import "subscription.proto";


service GatewayServer {
    rpc Invoke(InvokeRequest) returns (InvokeResponse);
    rpc Resolve(ResolveRequest) returns (ComponentInfo);
    rpc ListNaming(NamingRequest) returns (NamingResponse);
    rpc GetProperty(GetPropRequest) returns (PropertyValue);
    rpc SetProperty(SetPropRequest) returns (SetPropResponse);

    rpc SubscribeMonitor(MonitorReq) returns (stream MonitorEvent);
    rpc SubscribeAlarms(AlarmReq) returns (stream AlarmEvent);
    rpc SubscribeLogs(LogReq) returns (stream LogEvent);
    rpc SubscribeConfig(ConfigReq) returns (stream ConfigEvent);
}
