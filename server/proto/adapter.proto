syntax = "proto3";
package gateway;


// Arrays
message Dimension {
    uint32 rows = 1;  // 1 para arrays 1D
    uint32 cols = 2;  
}

message DoubleArray {
    Dimension dimension = 1;
    repeated double data = 2 [packed=true];
}

message FloatArray {
    Dimension dimension = 1;
    repeated float data = 2 [packed=true];
}

message LongArray {
    Dimension dimension = 1;
    repeated int32 data = 2 [packed=true];
}

message ShortArray {
    Dimension dimension = 1;
    repeated int32 data = 2 [packed=true];
}

message OctetArray {
    Dimension dimension = 1;
    bytes data = 2;
}


// MultiTypeList
message Sample {
    int64 time_stamp = 1;
    oneof value {
        double  double_val = 2;
        float   float_val  = 3;
        int32   long_val   = 4;
        int32   short_val  = 5;
        uint32  octet_val  = 6;
    }
}

message SampleList {
    repeated Sample samples = 1;
}

message SampleArray {
    int64       time_stamp = 1;
    oneof array_value {
        DoubleArray  double_array = 2;
        FloatArray   float_array  = 3;
        LongArray    long_array   = 4;
        ShortArray   short_array  = 5;
        bytes        octet_array  = 6;
    }
}

message SampleArrayList {
    repeated SampleArray samples = 1;
}

message MultiTypeList {
    oneof data {
        SampleList double_list = 1;
        SampleList float_list = 2;
        SampleList long_list = 3;
        SampleList short_list = 4;
        SampleList octet_list = 5;
        SampleArrayList double_arraylist = 6;
        SampleArrayList float_arraylist = 7;
        SampleArrayList long_arraylist = 8;
        SampleArrayList short_arraylist = 9;
        SampleArrayList octet_arraylist = 10;
    }
}

// AnyValue
enum TypeKind {
    TYPE_UNKNOWN   = 0;
    TYPE_FLOAT     = 1;
    TYPE_DOUBLE    = 2;
    TYPE_SHORT     = 3;
    TYPE_LONG      = 4;
    TYPE_BOOLEAN   = 5;
    TYPE_OCTET     = 6;
    TYPE_STRING    = 7;
    TYPE_TIMEVALUE = 8;
}

message AnyValue {
    TypeKind type_kind = 1;
    oneof value {
        double  double_val  = 2;
        float   float_val   = 3;
        int32   long_val    = 4;
        int32   short_val   = 5;
        bool    bool_val    = 6;
        uint32  octet_val   = 7;
        string  string_val  = 8;
        int64   time_val    = 9;
        bytes   raw_val     = 10;
    }
}
